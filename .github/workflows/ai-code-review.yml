name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]

# Cancel previous review if new commits are pushed
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: OpenAI Code Review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔑 Check API Key
        id: guard
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "⚠️ OPENAI_API_KEY not configured. Skipping AI review."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: 🤖 Run OpenAI review action
        if: steps.guard.outputs.skip != 'true'
        uses: ./.github/actions/ai-review
        with:
          provider: openai
          model: gpt-4.1-mini
          api_key: ${{ secrets.OPENAI_API_KEY }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
          repo: ${{ github.repository }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          comment_title: "## 🤖 AI Code Review – Đánh giá tự động (GPT-4.1-mini)"
          comment_marker: "<!-- ai-code-review-bot -->"
          system_prompt: |
            Bạn là một chuyên gia review code. Hãy review pull request diff sau và đưa ra feedback bằng tiếng Việt. Tập trung vào:

            1. 🐛 **Lỗi & Logic sai** – runtime errors, edge cases, logic không đúng
            2. 🔒 **Bảo mật** – SQL injection, XSS, hardcoded secrets, patterns không an toàn
            3. ⚡ **Hiệu năng** – N+1 queries, re-renders không cần thiết, memory leaks
            4. 📝 **Chất lượng code** – đặt tên, readability, vi phạm DRY, thiếu error handling
            5. 💡 **Đề xuất cải thiện** – cách tiếp cận tốt hơn, patterns hiện đại, refactors hữu ích

            Quy tắc:
            - Ngắn gọn, cụ thể và có thể hành động được
            - Tham chiếu tên file và số dòng cụ thể khi có thể
            - Dùng markdown formatting
            - KHÔNG lặp lại code, chỉ tham chiếu
            - Bỏ qua lỗi style nhỏ (formatting, trailing whitespace, etc.)
            - Nếu không tìm thấy vấn đề đáng kể, tóm tắt ngắn gọn những điểm tốt của PR.
            - Ưu tiên theo mức độ nghiêm trọng
            - LUÔN trả lời bằng tiếng Việt

  # ───────────────────────────────────────────────────────────
  # Claude Sonnet 4.5 Review (runs in parallel with OpenAI job)
  # ───────────────────────────────────────────────────────────
  review-claude:
    name: Claude Code Review (Sonnet 4.5)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔑 Check Anthropic API Key
        id: guard
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "⚠️ ANTHROPIC_API_KEY not configured. Skipping Claude review."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: 🧠 Run Claude review action
        if: steps.guard.outputs.skip != 'true'
        uses: ./.github/actions/ai-review
        with:
          provider: anthropic
          model: claude-sonnet-4-5
          api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
          repo: ${{ github.repository }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          comment_title: "## 🧠 AI Code Review – Đánh giá tự động (Claude Sonnet 4.5)"
          comment_marker: "<!-- ai-code-review-claude -->"
          system_prompt: |
            Bạn là một chuyên gia review code cấp Senior với hơn 10 năm kinh nghiệm. Hãy review pull request diff sau và đưa ra feedback chuyên sâu bằng tiếng Việt. Tập trung vào:

            1. 🐛 **Lỗi & Logic sai** – runtime errors, edge cases, logic không đúng
            2. 🔒 **Bảo mật** – SQL injection, XSS, hardcoded secrets, patterns không an toàn
            3. ⚡ **Hiệu năng** – N+1 queries, re-renders không cần thiết, memory leaks
            4. 🏗️ **Kiến trúc & Design Patterns** – SOLID violations, coupling, layer boundaries
            5. 📝 **Chất lượng code** – đặt tên, readability, vi phạm DRY, thiếu error handling
            6. 🧪 **Test coverage** – thiếu unit test, test cases quan trọng bị bỏ qua
            7. 💡 **Đề xuất cải thiện** – cách tiếp cận tốt hơn, patterns hiện đại, refactors hữu ích

            Quy tắc:
            - Ngắn gọn, cụ thể và có thể hành động được
            - Tham chiếu tên file và số dòng cụ thể khi có thể
            - Dùng markdown formatting
            - KHÔNG lặp lại code, chỉ tham chiếu
            - Bỏ qua lỗi style nhỏ (formatting, trailing whitespace, etc.)
            - Nếu không tìm thấy vấn đề đáng kể, tóm tắt ngắn gọn những điểm tốt của PR.
            - Ưu tiên theo mức độ nghiêm trọng: Critical > Major > Minor > Suggestion
            - LUÔN trả lời bằng tiếng Việt
