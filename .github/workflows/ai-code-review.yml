name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]

# Cancel previous review if new commits are pushed
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: OpenAI Code Review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔑 Check API Key
        id: guard
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "⚠️ OPENAI_API_KEY not configured. Skipping AI review."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: 🤖 Run OpenAI review action
        if: steps.guard.outputs.skip != 'true'
        continue-on-error: true
        uses: ./.github/actions/ai-review
        with:
          provider: openai
          model: gpt-4.1-mini
          api_key: ${{ secrets.OPENAI_API_KEY }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
          repo: ${{ github.repository }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          comment_title: "## 🤖 AI Code Review – Automated review (GPT-4.1-mini)"
          comment_marker: "<!-- ai-code-review-bot -->"
          system_prompt: |
            You are an expert code reviewer. Review the following pull request diff and provide feedback in Vietnamese. Focus on:

            1. 🐛 **Bugs & logic issues** – runtime errors, edge cases, incorrect logic
            2. 🔒 **Security** – SQL injection, XSS, hardcoded secrets, unsafe patterns
            3. ⚡ **Performance** – N+1 queries, unnecessary re-renders, memory leaks
            4. 📝 **Code quality** – naming, readability, DRY violations, missing error handling
            5. 💡 **Improvement suggestions** – better approaches, modern patterns, useful refactors

            Rules:
            - Be concise, specific, and actionable
            - Reference file names and line numbers when possible
            - Use Markdown formatting
            - DO NOT repeat code; only reference it
            - Ignore minor style issues (formatting, trailing whitespace, etc.)
            - If no significant issues are found, briefly summarize the PR's strengths
            - Prioritize by severity
            - ALWAYS respond in Vietnamese

  # ───────────────────────────────────────────────────────────
  # Claude Sonnet 4.6 Review (runs in parallel with OpenAI job)
  # ───────────────────────────────────────────────────────────
  review-claude:
    name: Claude Code Review (Sonnet 4.6)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔑 Check Anthropic API Key
        id: guard
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "⚠️ ANTHROPIC_API_KEY not configured. Skipping Claude review."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: 🧠 Run Claude review action
        if: steps.guard.outputs.skip != 'true'
        continue-on-error: true
        uses: ./.github/actions/ai-review
        with:
          provider: anthropic
          model: claude-sonnet-4-6
          api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
          repo: ${{ github.repository }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          comment_title: "## 🧠 AI Code Review – Automated review (Claude Sonnet 4.6)"
          comment_marker: "<!-- ai-code-review-claude -->"
          system_prompt: |
            You are a senior-level code review expert with over 10 years of experience. Review the following pull request diff and provide in-depth feedback in Vietnamese. Focus on:

            1. 🐛 **Bugs & logic issues** – runtime errors, edge cases, incorrect logic
            2. 🔒 **Security** – SQL injection, XSS, hardcoded secrets, unsafe patterns
            3. ⚡ **Performance** – N+1 queries, unnecessary re-renders, memory leaks
            4. 🏗️ **Architecture & design patterns** – SOLID violations, coupling, layer boundaries
            5. 📝 **Code quality** – naming, readability, DRY violations, missing error handling
            6. 🧪 **Test coverage** – missing unit tests, overlooked critical test cases
            7. 💡 **Improvement suggestions** – better approaches, modern patterns, useful refactors

            Rules:
            - Be concise, specific, and actionable
            - Reference file names and line numbers when possible
            - Use Markdown formatting
            - DO NOT repeat code; only reference it
            - Ignore minor style issues (formatting, trailing whitespace, etc.)
            - If no significant issues are found, briefly summarize the PR's strengths
            - Prioritize by severity: Critical > Major > Minor > Suggestion
            - ALWAYS respond in Vietnamese
