services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: diecast360
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/diecast360
      - DIRECT_URL=postgresql://postgres:postgres@db:5432/diecast360
      # Secrets have NO defaults — must be set in .env (copy from .env.example).
      # For local dev with weak placeholder values, copy docker-compose.override.yml.example
      # to docker-compose.override.yml and run `docker compose up` as normal.
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required. Copy .env.example to .env and set a strong secret.}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN:-7d}
      - UPLOAD_DIR=${UPLOAD_DIR:-./uploads}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - PORT=${PORT:-3000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_INDEX=${PINECONE_INDEX:-diecast360}
      - COOKIE_SECRET=${COOKIE_SECRET:?COOKIE_SECRET is required. Copy .env.example to .env and set a random 32+ char string.}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - COOKIE_SAME_SITE=${COOKIE_SAME_SITE:-lax}
      - FACEBOOK_PAGE_ID=${FACEBOOK_PAGE_ID:-}
      - FACEBOOK_PAGE_ACCESS_TOKEN=${FACEBOOK_PAGE_ACCESS_TOKEN:-}
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - ./uploads:/usr/src/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:${PORT:-3000}/api/v1').then(r=>r.ok||process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3000/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  pgdata:
